---
- hosts: all
  become: yes
  gather_facts: no

  tasks:
    - name: 1. Create OTel config directory
      raw: mkdir -p /etc/otel && chmod 755 /etc/otel

    - name: 2. Download and Extract OTel Binary
      raw: |
        curl -L https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v0.102.0/otelcol_0.102.0_linux_amd64.tar.gz -o /tmp/otelcol.tar.gz
        tar -xzf /tmp/otelcol.tar.gz -C /usr/bin/
        # Ensuring the binary is executable
        chmod +x /usr/bin/otelcol

    - name: 3. Deploy OTel config (with Prometheus Exporter)
      raw: |
        cat <<EOF > /etc/otel/config.yaml
        receivers:
          hostmetrics:
            collection_interval: 10s
            scrapers:
              cpu:
              memory:
              disk:
              network:
        processors:
          batch:
        exporters:
          debug:
            verbosity: normal
          prometheus:
            endpoint: "0.0.0.0:8889"
        service:
          pipelines:
            metrics:
              receivers: [hostmetrics]
              processors: [batch]
              exporters: [debug, prometheus]
        EOF
        chmod 644 /etc/otel/config.yaml

    - name: 4. Create systemd service
      raw: |
        cat <<EOF > /etc/systemd/system/otelcol.service
        [Unit]
        Description=OpenTelemetry Collector
        After=network.target
        [Service]
        ExecStart=/usr/bin/otelcol --config /etc/otel/config.yaml
        Restart=always
        User=root
        [Install]
        WantedBy=multi-user.target
        EOF

    - name: 5. Start and Enable OTel Service
      raw: |
        systemctl daemon-reload
        systemctl enable otelcol
        systemctl restart otelcol
