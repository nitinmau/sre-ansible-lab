---
- hosts: all
  become: yes
  gather_facts: no  # Stops Ansible from looking for Python at the start

  tasks:
    - name: Create OTel config directory
      raw: mkdir -p /etc/otel && chmod 755 /etc/otel

    - name: Download and Extract OTel
      raw: |
        curl -L https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v0.102.0/otelcol_0.102.0_linux_amd64.tar.gz -o /tmp/otelcol.tar.gz
        tar -xzf /tmp/otelcol.tar.gz -C /usr/bin/

    - name: Deploy OTel config
      raw: |
        cat <<EOF > /etc/otel/config.yaml
        receivers:
          hostmetrics:
            collection_interval: 10s
            scrapers:
              cpu:
              memory:
        processors:
          batch:
        exporters:
          debug:
            verbosity: normal
        service:
          pipelines:
            metrics:
              receivers: [hostmetrics]
              processors: [batch]
              exporters: [debug]
        EOF

    - name: Create systemd service
      raw: |
        cat <<EOF > /etc/systemd/system/otelcol.service
        [Unit]
        Description=OpenTelemetry Collector
        After=network.target
        [Service]
        ExecStart=/usr/bin/otelcol --config /etc/otel/config.yaml
        Restart=always
        User=root
        [Install]
        WantedBy=multi-user.target
        EOF

    - name: Start OTel Service
      raw: systemctl daemon-reload && systemctl enable otelcol && systemctl restart otelcol
