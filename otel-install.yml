---
- hosts: all
  become: yes
  gather_facts: no
  vars:
    # Ensures Ansible uses the system Python 3 on Ubuntu
    ansible_python_interpreter: /usr/bin/python3

  pre_tasks:
    - name: Ensure system tools are present
      apt:
        name:
          - curl
          - tar
        state: present
        update_cache: yes

  tasks:
    - name: Create OTel config directory
      file:
        path: /etc/otel
        state: directory
        mode: '0755'

    - name: Download OTel Collector
      get_url:
        url: https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v0.102.0/otelcol_0.102.0_linux_amd64.tar.gz
        dest: /tmp/otelcol.tar.gz

    - name: Extract OTel Collector
      unarchive:
        src: /tmp/otelcol.tar.gz
        dest: /usr/bin/
        remote_src: yes

    - name: Deploy OTel config
      copy:
        src: config.yaml
        dest: /etc/otel/config.yaml
      notify: Restart OTel  # Triggers the handler if the file changes

    - name: Create systemd service
      copy:
        dest: /etc/systemd/system/otelcol.service
        content: |
          [Unit]
          Description=OpenTelemetry Collector
          After=network.target

          [Service]
          ExecStart=/usr/bin/otelcol --config /etc/otel/config.yaml
          Restart=always
          User=root

          [Install]
          WantedBy=multi-user.target
      notify: Restart OTel

    - name: Ensure OTel service is enabled and started
      systemd:
        name: otelcol
        enabled: yes
        state: started

  handlers:
    - name: Restart OTel
      systemd:
        name: otelcol
        state: restarted
        daemon_reload: yes
