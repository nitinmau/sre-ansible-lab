---
- hosts: all
  become: yes
  tasks:
    - name: Create Prometheus User as System User
      user:
        name: prometheus
        shell: /bin/false
        system: yes
        create_home: no

    - name: Install Node Exporter (System Metrics)
      apt:
        name: prometheus-node-exporter
        state: present
        update_cache: yes

    - name: Ensure Node Exporter is running
      systemd:
        name: prometheus-node-exporter
        state: started
        enabled: yes

    - name: Download Prometheus
      get_url:
        url: https://github.com/prometheus/prometheus/releases/download/v2.51.0/prometheus-2.51.0.linux-amd64.tar.gz
        dest: /tmp/prometheus.tar.gz
        timeout: 60
        force: no

    - name: Extract Prometheus
      unarchive:
        src: /tmp/prometheus.tar.gz
        dest: /tmp/
        remote_src: yes

    - name: Move Prometheus Binaries
      copy:
        src: "/tmp/prometheus-2.51.0.linux-amd64/{{ item }}"
        dest: /usr/local/bin/
        mode: '0755'
        remote_src: yes
      loop: [ 'prometheus', 'promtool' ]

    - name: Create Config Directory
      file:
        path: /etc/prometheus
        state: directory
        owner: prometheus
        group: prometheus

    - name: Deploy Full Prometheus Config
      copy:
        dest: /etc/prometheus/prometheus.yml
        owner: prometheus
        group: prometheus
        content: |
          global:
            scrape_interval: 10s
          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']

            - job_name: 'otel-collector'
              static_configs:
                - targets: ['localhost:8889']

            - job_name: 'node-exporter'
              static_configs:
                - targets: ['localhost:9100']

    - name: Create systemd service
      copy:
        dest: /etc/systemd/system/prometheus.service
        content: |
          [Unit]
          Description=Prometheus
          Wants=network-online.target
          After=network-online.target
          [Service]
          User=prometheus
          Group=prometheus
          Type=simple
          ExecStart=/usr/local/bin/prometheus --config.file /etc/prometheus/prometheus.yml --storage.tsdb.path=/var/lib/prometheus/
          Restart=always
          [Install]
          WantedBy=multi-user.target

    - name: Create Data Directory
      file:
        path: /var/lib/prometheus
        state: directory
        owner: prometheus
        group: prometheus

    - name: Ensure correct ownership on data directory
      file:
        path: /var/lib/prometheus
        owner: prometheus
        group: prometheus
        recurse: yes

    - name: Start Prometheus
      systemd:
        name: prometheus
        state: restarted
        enabled: yes
        daemon_reload: yes
