---
- hosts: all
  become: yes
  gather_facts: no
  vars:
    # Changed to the standard path that exists on the target VM
    ansible_python_interpreter: /usr/bin/python3

  pre_tasks:
    - name: Ensure system tools are present
      apt:
        name:
          - curl
          - tar
        state: present
        update_cache: yes

  tasks:
    - name: Create OTel config directory
      file:
        path: /etc/otel
        state: directory
        mode: '0755'

    - name: Download OTel Collector
      get_url:
        url: https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v0.102.0/otelcol_0.102.0_linux_amd64.tar.gz
        dest: /tmp/otelcol.tar.gz

    - name: Extract OTel Collector
      unarchive:
        src: /tmp/otelcol.tar.gz
        dest: /usr/bin/
        remote_src: yes

    - name: Deploy OTel config
      copy:
        # Since you are running this FROM the otel folder, 
        # the source is just config.yaml
        src: config.yaml
        dest: /etc/otel/config.yaml

    - name: Create systemd service
      copy:
        dest: /etc/systemd/system/otelcol.service
        content: |
          [Unit]
          Description=OpenTelemetry Collector
          After=network.target

          [Service]
          ExecStart=/usr/bin/otelcol --config /etc/otel/config.yaml
          Restart=always
          User=root

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      command: systemctl daemon-reload

    - name: Enable and start OTel service
      systemd:
        name: otelcol
        enabled: yes
        state: started
